# ==============================================================================
# docker-compose.yml — Secure File Transfer
# Два сервіси: relay (FastAPI) + nginx (reverse proxy, TLS termination)
# Відповідає специфікації підрозділу 3.8.2 звіту
# ==============================================================================

version: "3.9"

services:
  # ── Relay Server ────────────────────────────────────────────────────
  relay:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sft-relay
    restart: unless-stopped
    environment:
      - SFT_HOST=0.0.0.0
      - SFT_PORT=8000
      - SFT_LOG_LEVEL=INFO
      - SFT_SESSION_TTL_SECONDS=1800
      - SFT_MAX_SESSIONS=1000
    volumes:
      - relay-logs:/app/logs
    networks:
      - app-network
    # Порт 8000 доступний лише у внутрішній мережі Docker
    expose:
      - "8000"

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sft-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"   # Redirect to HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/ssl/certs:ro
      - ../static:/var/www/static:ro
    depends_on:
      - relay
    networks:
      - app-network

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  relay-logs:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
