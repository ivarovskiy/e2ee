# ==============================================================================
# nginx.conf — Secure File Transfer
# Reverse proxy з TLS 1.3 термінацією та WebSocket-проксуванням
# Відповідає вимогам безпеки підрозділу 3.7.3 звіту
# ==============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логування
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 110M;  # Трохи більше за 100 МБ ліміт файлів

    # Upstream — relay-сервер
    upstream relay {
        server relay:8000;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS сервер
    server {
        listen 443 ssl;
        server_name _;

        # ── TLS 1.3 конфігурація (вимоги 3.7.3) ──────────────────────
        ssl_certificate     /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/certs/privkey.pem;

        ssl_protocols TLSv1.3;
        ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;
        ssl_prefer_server_ciphers off;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Статичні файли клієнта ────────────────────────────────────
        location / {
            root /var/www/static;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── API проксування ───────────────────────────────────────────
        location /api/ {
            proxy_pass http://relay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket проксування ─────────────────────────────────────
        location /ws/ {
            proxy_pass http://relay;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Таймаути для тривалих WebSocket-з'єднань
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
        }

        # ── Join URL (для QR-коду) ────────────────────────────────────
        location /join/ {
            root /var/www/static;
            try_files /index.html =404;
        }
    }
}
